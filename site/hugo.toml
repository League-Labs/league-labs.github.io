baseURL = "https://labs.jointheleague.org/"
title = "League Labs"
theme = "curriculum-hugo-theme"
enableEmoji = true
disableKinds = ["taxonomy", "term"]

# Mount course.yml as Hugo data so templates can read it
# directly via .Site.Data.course — no need to duplicate fields.
[[module.mounts]]
  source = "content"
  target = "content"
[[module.mounts]]
  source = "../course.yml"
  target = "data/course.yml"

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4

[params]
  copyright = "The League of Amazing Programmers"
  license = "CC BY-NC 4.0"
  curriculum_version = "0.20260505.1"
  curik_version = "0.20260504.1"
  instructorGuide = true

[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 10

  [[menu.main]]
    name = "Calendar"
    url = "/calendar/"
    weight = 20

  [[menu.main]]
    name = "Teams"
    url = "/teams/"
    weight = 30
    identifier = "teams"

  [[menu.main]]
    name = "Summer 2026"
    url = "/teams/summer26/"
    parent = "teams"
    weight = 31

  [[menu.main]]
    name = "Summer 2025"
    url = "/teams/summer25/"
    parent = "teams"
